name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
      # Use `npm install --no-optional` in CI to avoid cross-platform optional native
      # bindings (e.g. pino's @emnapi/*) causing lockfile mismatch errors.
      - run: npm install --no-optional --no-audit --no-fund
      - run: npm run lint
      - run: npm test
      - run: npm run build
